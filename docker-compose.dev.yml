# Frontend Development - Backend built from local source
#
# Usage:
#   1. docker compose -f docker-compose.dev.yml up -d
#   2. cd web && bun install && bun run dev
#   3. Open http://localhost:3001 — Rsbuild proxies /api, /mj, /pg, /v1, /v1beta, /suno to :3000
#
# Rebuild backend after Go code changes:
#   docker compose -f docker-compose.dev.yml up -d --build new-api
#
# Stop:
#   docker compose -f docker-compose.dev.yml down
#
# Local cap 2 CPU / 4GiB on new-api only:
#   docker compose -f docker-compose.dev.yml -f docker-compose.local-2c4g.yml up -d
#
# Reset data:
#   docker compose -f docker-compose.dev.yml down -v
#
# Override DB: set SQL_DSN in `.env` next to this file (e.g. external MySQL).

services:
  new-api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: new-api-dev:local
    container_name: new-api-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - dev_data:/data
    environment:
      - SQL_DSN=${SQL_DSN:-root:123456@tcp(mysql:3306)/new-api?parseTime=true}
      - REDIS_CONN_STRING=${REDIS_CONN_STRING:-redis://redis:6379}
      - SESSION_SECRET=cluster_secret
      - CRYPTO_SECRET=cluster_secret
      - TZ=Asia/Shanghai
      - BATCH_UPDATE_ENABLED=true
    depends_on:
      redis:
        condition: service_started
      mysql:
        condition: service_healthy
    networks:
      - dev-network

  redis:
    image: redis:7-alpine
    container_name: new-api-dev-redis
    restart: unless-stopped
    networks:
      - dev-network

  mysql:
    image: mysql:8.2
    container_name: new-api-dev-mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: new-api
    volumes:
      - dev_mysql_data:/var/lib/mysql
    networks:
      - dev-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p123456"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 40s

volumes:
  dev_data:
  dev_mysql_data:

networks:
  dev-network:
    driver: bridge
