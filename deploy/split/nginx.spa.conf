# Scheme A — SPA and browser API share one origin; proxies API paths to the Go service (`1router.ai:3000` in Compose).
# Variable proxy_pass + Docker DNS resolver avoids static resolve at `nginx -t` bootstrap.
# Bare-metal: set `upstream_host` env via template, or edit `proxy_pass $backend_new_api` scheme below.
#
# Use `Connection ""` to upstream (HTTP/1.1 keepalive). The old `map … '' close` pattern forces
# Connection: close to the backend and can cause 502 under high concurrency (e.g. load tests).

server {
    listen 80;
    server_name _;
    # Docker Embedded DNS — resolves other Compose service names
    resolver 127.0.0.11 ipv6=off valid=30s;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;
    gzip_min_length 256;

    # Rsbuild emits hashed bundles under /static/
    location ~* ^/static/.*\.(?:js|css)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # --- Proxy backend (streaming / SSE friendly) ---
    set $backend_new_api http://1router.ai:3000;
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_connect_timeout 75s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_set_header Upgrade $http_upgrade;
    # Enables connection reuse toward Go; avoids 502 bursts when many concurrent /v1 clients hit this Nginx
    proxy_set_header Connection "";

    location /api/ {
        proxy_pass $backend_new_api;
    }

    location /v1/ {
        proxy_pass $backend_new_api;
    }

    location /pg/ {
        proxy_pass $backend_new_api;
    }

    location /mj/ {
        proxy_pass $backend_new_api;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
