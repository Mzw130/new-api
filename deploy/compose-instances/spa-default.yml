name: 1router-spa

services:
  spa:
    build:
      context: ../..
      dockerfile: Dockerfile.web
      args:
        VITE_REACT_APP_SERVER_URL: "${SPA_BAKED_API_ORIGIN:-}"
    image: 1router:spa
    container_name: 1router-spa
    restart: always
    ports:
      - "${SPA_HOST_PORT:-3003}:80"
    networks:
      - new-api-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.30"
          memory: 96M

networks:
  new-api-network:
    external: true
    # 与 API 容器同网：分列栈默认 new-api-network；若 API 来自 docker-compose.monolith.yml 则设为 new-api_new-api-network
    name: ${NEW_API_DOCKER_NETWORK:-new-api-network}
